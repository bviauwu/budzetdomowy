<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Budżet domowy</title>
<style>
</style>
</head>
<body>
<h1>Budżet domowy</h1>
<h2>Saldo: <span id="total">0</span></h2>
<form id="form">
    <input type="number" step="0.01" id="amount" placeholder="Kwota" required>
    <select id="type">
        <option value="income">Przychód</option>
        <option value="expense">Wydatek</option>
    </select>
    <input type="text" id="desc" placeholder="Opis">
    <button>Dodaj</button>
</form>

<h2>Lista</h2>
<ul id="list"></ul>
</body>
</html>
