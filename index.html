<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Budżet domowy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Budżet domowy</h1>
<h2>Całkowite saldo: <span id="total">0</span></h2>
<h2>Wydatki: <span id="expenses">0</span></h2>
<div id="noFundsAlert" class="alert alert-warning" style="display: none;">
    ⚠️ Nie ma funduszy! Saldo wynosi 0 - nie można dokonywać wypłat.
</div>
<input type="text" id="memberName" placeholder="Imię członka">
<button onclick="addMember()">Dodaj osobę</button>

<br><br>
<form id="form">
    <input type="number" step="0.01" id="amount" placeholder="Kwota" required>

    <select id="type">
        <option value="income">Przychód</option>
        <option value="expense">Wydatek</option>
    </select>
    <select id="member"></select>
    
    <select id="category" required>
        <option value="">-- Wybierz kategorię --</option>
        <option value="Impreza">Impreza</option>
        <option value="Jedzenie">Jedzenie</option>
        <option value="Zachcianka">Zachcianka</option>
        <option value="Alkohol">Alkohol</option>
        <option value="Narkotyki">Narkotyki</option>
        <option value="Papierosy">Papierosy</option>
        <option value="Dom">Dom</option>
        <option value="Auto">Auto</option>
        <option value="Wakacje">Wakacje</option>
        <option value="Hazard">Hazard</option>
    </select>
    
    <input type="text" id="desc" placeholder="Opis (opcjonalnie)">

    <button>Dodaj</button>
</form>

<div class="kontener">
    <div class="wplaty">
        <h2>Wpłaty</h2>
        <div id="income-list"></div>
    </div>

    <div class="wplaty">
        <h2>Wydatki</h2>
        <div id="expense-list"></div>
    </div>
</div>

<h2>Wykres wydatków</h2>
<canvas id="spendingChart" height="100"></canvas>

<h2>Podsumowanie po kategoriach</h2>
<div id="categories-summary"></div>

<h2>Analiza wydatków</h2>
<div id="spending-analysis"></div>

<h2>Saldo osób</h2>
<div id="saldo"></div>

<!-- Modal dla komentarzy -->
<div id="commentModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeCommentModal()">&times;</span>
        <h3>Komentarze i Reactions</h3>
        <div id="modal-transaction-info"></div>
        <div id="reactions-container" class="reactions">
            <button class="reaction-btn" onclick="addReaction('👍')">👍</button>
            <button class="reaction-btn" onclick="addReaction('❤️')">❤️</button>
            <button class="reaction-btn" onclick="addReaction('😍')">😍</button>
            <button class="reaction-btn" onclick="addReaction('😡')">😡</button>
            <button class="reaction-btn" onclick="addReaction('😢')">😢</button>
        </div>
        <div id="reactions-display"></div>
        <div id="comments-container">
            <div id="comments-list"></div>
            <input type="text" id="commentInput" placeholder="Dodaj komentarz..." />
            <button onclick="addComment()">Dodaj komentarz</button>
        </div>
    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</html>
